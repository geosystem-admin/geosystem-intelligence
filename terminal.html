<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEOSYSTEM | Intelligence Stream v5.9.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --neon: #36f4d0; --bg: #020617; }
        body { 
            font-family: 'JetBrains Mono', monospace; 
            background-color: var(--bg); color: var(--neon); 
            background-image: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%);
            background-size: 100% 4px; margin: 0; padding: 10px;
        }
        .grid-node { border: 1px solid rgba(54, 244, 208, 0.2); background: rgba(2, 6, 23, 0.9); padding: 8px; margin-bottom: 8px; }
        .label-node { font-size: 8px; font-weight: bold; border-bottom: 1px solid rgba(54, 244, 208, 0.3); margin-bottom: 6px; color: var(--neon); display: block; letter-spacing: 1px; }
        .sync-flash { animation: flash 0.5s ease-out; }
        @keyframes flash { 0% { background-color: #36f4d0; opacity: 0.8; } 100% { background-color: var(--bg); } }
        iframe { filter: grayscale(0.2) contrast(1.1); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="uppercase text-[9px]">

    <nav class="flex justify-between border-b border-zinc-800 pb-2 mb-2 items-center">
        <div class="flex flex-col">
            <span class="tracking-tighter font-bold text-cyan-400 text-[10px]">GEOSYSTEM // STREAM_V5.9_OMNI</span>
            <span class="text-[6px] text-zinc-500 italic">TRANSMISOR DE VERDADES ETERNAS</span>
        </div>
        <div id="reloj-v9" class="font-bold text-[13px] bg-zinc-900 px-3 py-1 rounded border border-cyan-500 text-cyan-400 shadow-[0_0_15px_rgba(54,244,208,0.2)]">00:00:00</div>
    </nav>

    <div class="grid-node !p-0 border-zinc-800 mb-3 overflow-hidden h-8 flex items-center">
        <div class="bg-red-900 text-white px-3 h-full flex items-center font-bold text-[7px] animate-pulse z-10">LIVE</div>
        <div class="flex-1 h-full min-w-0">
            <iframe src="https://s.tradingview.com/embed-widget/ticker-tape/?colorTheme=dark&isTransparent=true&displayMode=regular&width=100%25&height=32&locale=es" width="100%" height="32" frameborder="0" scrolling="no"></iframe>
        </div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4">
        <div class="grid-node border-l-2 border-l-cyan-500">
            <span class="label-node">NODE_01 (BTC/USDT)</span>
            <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=BINANCE%3ABTCUSDT&theme=dark" class="w-full h-24" frameborder="0"></iframe>
        </div>
        <div class="grid-node border-l-2 border-l-red-600">
            <span class="label-node">NODE_02 (CHINA_ASHR)</span>
            <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=AMEX%3AASHR&theme=dark" class="w-full h-24" frameborder="0"></iframe>
        </div>
        <div class="grid-node border-l-2 border-l-blue-600">
            <span class="label-node">NODE_03 (FED_SPY)</span>
            <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=AMEX%3ASPY&theme=dark" class="w-full h-24" frameborder="0"></iframe>
        </div>
        <div class="grid-node border-l-2 border-l-yellow-600">
            <span class="label-node">NODE_04 (LATAM_ILF)</span>
            <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=AMEX%3AILF&theme=dark" class="w-full h-24" frameborder="0"></iframe>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
        <div class="md:col-span-2 grid-node border-cyan-700 bg-black/60 shadow-inner">
            <span class="label-node">SISTEMA_INTELIGENCIA_IA</span>
            <div id="status-display" class="h-12 text-[7px] text-zinc-500 italic mb-2 overflow-y-auto">
                <p>> ESPERANDO AUTORIZACIÓN PARA MANIFIESTO 8...</p>
            </div>
            
            <div id="hidden-core" class="hidden">
                <div class="border border-cyan-500 bg-black mb-3 shadow-[0_0_20px_rgba(54,244,208,0.2)]">
                    <iframe id="youtube-frame" src="" frameborder="0" allow="autoplay; fullscreen" class="w-full aspect-video"></iframe>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <button class="bg-black border border-cyan-500/50 p-2 font-bold hover:bg-cyan-500 hover:text-black transition">DONACIONES</button>
                    <button class="bg-black border border-cyan-500/50 p-2 font-bold hover:bg-cyan-500 hover:text-black transition">SUSCRIPCIONES</button>
                    <button class="bg-black border border-cyan-500/50 p-2 font-bold hover:bg-cyan-500 hover:text-black transition">COLABORACIONES</button>
                </div>
            </div>
        </div>

        <div class="grid-node border-yellow-900 bg-yellow-950/10">
            <span class="label-node text-yellow-500">ACCESO_GX_SECURE</span>
            <div id="login-form">
                <input type="text" id="pass-input" placeholder="CLAVE EMISARIO" class="w-full bg-black border border-zinc-800 p-2 text-cyan-400 mb-2 text-[8px] outline-none uppercase">
                <button onclick="validateAccess()" class="w-full bg-[#36f4d0] text-black font-black p-2 text-[8px] uppercase hover:bg-white active:scale-95 transition shadow-lg">SINCRONIZAR NÚCLEO</button>
            </div>
        </div>
    </div>

    <script>
        // MOTOR DE TIEMPO REAL
        function initClock() {
            const clockEl = document.getElementById('reloj-v9');
            const refresh = () => {
                clockEl.innerText = new Date().toLocaleTimeString();
            };
            setInterval(refresh, 1000);
            refresh();
        }

        // SISTEMA DE VALIDACIÓN Y DESPLIEGUE
        function validateAccess() {
            const key = document.getElementById('pass-input').value.trim().toUpperCase();
            
            // CLAVE MAESTRA
            if(key === "GX-8-7-IMMORTAL") {
                // Flash de sincronía
                document.body.classList.add('sync-flash');
                setTimeout(() => document.body.classList.remove('sync-flash'), 500);

                // Actualizar interfaz
                document.getElementById('status-display').innerHTML = `
                    <p class="text-cyan-400 font-bold">> ACCESO CONCEDIDO: BIENVENIDO EMISARIO INMORTAL</p>
                    <p class="text-zinc-400">> CARGANDO MANIFIESTO 8 - VERDAD ETERNA...</p>
                `;
                
                // Carga de Video (Asegúrate de poner tu ID aquí)
                const videoId = "Xo_HhL6Z3A0"; 
                document.getElementById('youtube-frame').src = "https://www.youtube.com/embed/" + videoId + "?autoplay=1";
                
                // Mostrar componentes ocultos
                document.getElementById('hidden-core').classList.remove('hidden');
                document.getElementById('login-form').innerHTML = '<div class="text-cyan-500 text-center py-2 border border-cyan-900 font-bold animate-pulse">SISTEMA ONLINE</div>';
            } else {
                alert("ERROR: CREDENCIAL NO AUTORIZADA");
            }
        }

        // INICIALIZACIÓN GLOBAL
        window.addEventListener('DOMContentLoaded', () => {
            initClock();
        });
    </script>
</body>
</html>
