<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEOSYSTEM | Nexus Core v6.1 Full</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --neon: #36f4d0; --bg: #020617; }
        body { 
            font-family: 'JetBrains Mono', monospace; 
            background-color: var(--bg); color: var(--neon); 
            background-image: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%);
            background-size: 100% 4px; margin: 0; padding: 10px;
        }
        .grid-node { border: 1px solid rgba(54, 244, 208, 0.2); background: rgba(2, 6, 23, 0.9); padding: 8px; margin-bottom: 8px; }
        .label-node { font-size: 8px; font-weight: bold; border-bottom: 1px solid rgba(54, 244, 208, 0.3); margin-bottom: 6px; color: var(--neon); display: block; letter-spacing: 1px; }
        .status-pill { padding: 2px 5px; border-radius: 2px; font-size: 6px; border: 1px solid; }
        .open { color: #34d399; border-color: #34d399; box-shadow: 0 0 8px #34d399; }
        .closed { color: #f87171; border-color: #f87171; opacity: 0.5; }
        .agent-log { font-size: 7px; color: #a1a1aa; border-left: 1px solid #1e293b; padding-left: 5px; margin-bottom: 2px; }
        .btn-synergy { background: black; border: 1px solid rgba(54, 244, 208, 0.4); padding: 10px; text-align: center; font-weight: bold; font-size: 8px; transition: all 0.3s; cursor: pointer; }
        .btn-synergy:hover { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); }
        .sync-flash { animation: flash 0.5s ease-out; }
        @keyframes flash { 0% { background-color: #36f4d0; opacity: 0.8; } 100% { background-color: var(--bg); } }
        iframe { filter: contrast(1.1) brightness(0.9); border: none; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
