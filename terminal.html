<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEOSYSTEM | Nexus Time v4.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --neon: #36f4d0; --bg: #020617; }
        body { 
            font-family: 'JetBrains Mono', monospace; 
            background-color: var(--bg); color: var(--neon); 
            background-image: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%);
            background-size: 100% 4px;
        }
        .grid-node { border: 1px solid rgba(54, 244, 208, 0.2); background: rgba(2, 6, 23, 0.9); padding: 8px; }
        .label-node { font-size: 8px; font-weight: bold; border-bottom: 1px solid rgba(54, 244, 208, 0.3); margin-bottom: 6px; color: var(--neon); display: block; letter-spacing: 1px; }
        .telex-container { background: rgba(0, 0, 0, 0.8); border-top: 1px solid var(--neon); border-bottom: 1px solid var(--neon); overflow: hidden; white-space: nowrap; padding: 5px 0; }
        .telex-text { display: inline-block; animation: marquee 50s linear infinite; font-size: 10px; font-weight: bold; }
        @keyframes marquee { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
        /* Restauración de Estilos de Sesión */
        .session-active { color: var(--neon); text-shadow: 0 0 10px var(--neon); font-weight: bold; animation: pulse 2s infinite; }
        .session-off { color: #18181b; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="p-2 md:p-4 uppercase text-[9px]">

    <nav class="flex justify-between border-b border-zinc-800 pb-2 mb-3">
        <span class="tracking-tighter font-bold italic text-cyan-400">GEOSYSTEM // NEXUS_TIME_V4.4</span>
        <span id="reloj-principal" class="font-bold">00:00:00</span>
    </nav>

    <div class="grid grid-cols-4 gap-1 mb-3 text-center border border-zinc-800 p-2 bg-black/60 text-[7px]">
        <div><p class="text-zinc-600">TOKIO</p><p id="sess-tokyo" class="session-off">● ACTIVE</p></div>
        <div><p class="text-zinc-600">LONDRES</p><p id="sess-london" class="session-off">● ACTIVE</p></div>
        <div><p class="text-zinc-600">N. YORK</p><p id="sess-ny" class="session-off">● ACTIVE</p></div>
        <div><p class="text-zinc-600">LATAM</p><p id="sess-latam" class="session-off">● ACTIVE</p></div>
    </div>

    <div class="grid-node border-cyan-500 mb-4 bg-black/80">
        <span class="label-node text-cyan-400">BUSCADOR_DE_ACTIVOS</span>
        <div class="flex gap-2">
            <input type="text" id="search-symbol" placeholder="EJ: AAPL, BTCUSD, ASHR..." class="flex-1 bg-black border border-zinc-800 p-2 text-cyan-400 outline-none text-[10px]">
            <button onclick="projectSymbol()" class="bg-cyan-500 text-black font-black px-4 py-2 text-[9px]">PROYECTAR</button>
        </div>
    </div>

    <div id="projection-node" class="grid-node border-l-2 border-l-white mb-4 hidden">
        <span class="label-node text-white" id="projection-label">PROYECCIÓN_ACTIVA</span>
        <div id="search-result-container" class="w-full h-48"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2 mb-6">
        <div class="grid-node border-l-2 border-l-orange-500">
            <span class="label-node">ENERGÍA (WTI)</span>
            <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=TVC%3AUSOIL&theme=dark" class="w-full h-28" frameborder="0"></iframe>
        </div>
        <div class="grid-node border-l-2 border-l-cyan-500">
            <span class="label-node">TOKEN (BTC)</span>
            <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=BINANCE%3ABTCUSDT&theme=dark" class="w-full h-28" frameborder="0"></iframe>
        </div>
        <div class="grid-node border-l-2 border-l-red-600">
            <span class="label-node">ASIA (ASHR)</span>
            <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=AMEX%3AASHR&theme=dark" class="w-full h-28" frameborder="0"></iframe>
        </div>
        <div class="grid-node border-l-2 border-l-blue-600">
            <span class="label-node">USA (SPY)</span>
            <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=AMEX%3ASPY&theme=dark" class="w-full h-28" frameborder="0"></iframe>
        </div>
        <div class="grid-node border-l-2 border-l-zinc-100">
            <span class="label-node">EUROPA (DAX)</span>
            <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=INDEX%3ADAX&theme=dark" class="w-full h-28" frameborder="0"></iframe>
        </div>
        <div class="grid-node border-l-2 border-l-yellow-600">
            <span class="label-node">LATAM (ILF)</span>
            <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=AMEX%3AILF&theme=dark" class="w-full h-28" frameborder="0"></iframe>
        </div>
    </div>

    <script>
        // MOTOR DE TIEMPO UNIVERSAL REINSTALADO
        function updateEngine() {
            const now = new Date();
            const h = now.getUTCHours();
            
            // Lógica de sesiones (UTC)
            document.getElementById('sess-tokyo').className = (h >= 0 && h <= 9) ? 'session-active' : 'session-off';
            document.getElementById('sess-london').className = (h >= 8 && h <= 17) ? 'session-active' : 'session-off';
            document.getElementById('sess-ny').className = (h >= 13 && h <= 22) ? 'session-active' : 'session-off';
            document.getElementById('sess-latam').className = (h >= 13 && h <= 21) ? 'session-active' : 'session-off';
            
            document.getElementById('reloj-principal').innerText = now.toLocaleTimeString();
        }

        function projectSymbol() {
            const sym = document.getElementById('search-symbol').value.toUpperCase().replace(/\s/g, "");
            if(!sym) return;
            document.getElementById('projection-node').classList.remove('hidden');
            document.getElementById('projection-label').innerText = `PROYECCIÓN_ACTIVA: ${sym}`;
            document.getElementById('search-result-container').innerHTML = `
                <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=${sym}&theme=dark" 
                        class="w-full h-48" frameborder="0"></iframe>`;
        }

        setInterval(updateEngine, 1000);
        updateEngine();
    </script>
</body>
</html>
