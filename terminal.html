<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEOSYSTEM | Intelligence Stream v5.8.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --neon: #36f4d0; --bg: #020617; }
        body { 
            font-family: 'JetBrains Mono', monospace; 
            background-color: var(--bg); color: var(--neon); 
            background-image: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%);
            background-size: 100% 4px; margin: 0; padding: 10px;
        }
        .grid-node { border: 1px solid rgba(54, 244, 208, 0.2); background: rgba(2, 6, 23, 0.9); padding: 8px; margin-bottom: 8px; }
        .label-node { font-size: 8px; font-weight: bold; border-bottom: 1px solid rgba(54, 244, 208, 0.3); margin-bottom: 6px; color: var(--neon); display: block; letter-spacing: 1px; }
        .status-pill { padding: 2px 5px; border-radius: 2px; font-size: 6px; border: 1px solid; }
        .open { color: #34d399; border-color: #34d399; }
        .closed { color: #f87171; border-color: #f87171; opacity: 0.5; }
        .sync-flash { animation: flash 0.5s ease-out; }
        @keyframes flash { 0% { background-color: #36f4d0; opacity: 0.8; } 100% { background-color: var(--bg); } }
    </style>
</head>
<body class="uppercase text-[9px]">

    <nav class="flex justify-between border-b border-zinc-800 pb-2 mb-2 items-center">
        <div class="flex flex-col">
            <span class="tracking-tighter font-bold text-cyan-400">GEOSYSTEM // STREAM_V5.8_FULL_NODES</span>
            <span class="text-[6px] text-zinc-500 italic">TRANSMISOR DE VERDADES ETERNAS</span>
        </div>
        <div id="reloj-v8" class="font-bold text-[12px] bg-zinc-900 px-3 py-1 rounded border border-cyan-500 text-cyan-400">00:00:00</div>
    </nav>

    <div class="grid-node !p-0 border-zinc-800 mb-3 overflow-hidden h-8 flex items-center">
        <div class="bg-red-900 text-white px-3 h-full flex items-center font-bold text-[7px] animate-pulse">LIVE</div>
        <div class="flex-1 h-full"><iframe src="https://s.tradingview.com/embed-widget/ticker-tape/?colorTheme=dark&displayMode=regular&width=100%25&height=32&locale=es" width="100%" height="32" frameborder="0"></iframe></div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4">
        <div class="grid-node border-l-2 border-l-cyan-500">
            <span class="label-node">NODE_01 (BTC)</span>
            <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=BINANCE%3ABTCUSDT&theme=dark" class="w-full h-24" frameborder="0"></iframe>
        </div>
        <div class="grid-node border-l-2 border-l-red-600">
            <span class="label-node">NODE_02 (ASHR)</span>
            <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=AMEX%3AASHR&theme=dark" class="w-full h-24" frameborder="0"></iframe>
        </div>
        <div class="grid-node border-l-2 border-l-blue-600">
            <span class="label-node">NODE_03 (SPY)</span>
            <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=AMEX%3ASPY&theme=dark" class="w-full h-24" frameborder="0"></iframe>
        </div>
        <div class="grid-node border-l-2 border-l-yellow-600">
            <span class="label-node">NODE_04 (ILF)</span>
            <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=AMEX%3AILF&theme=dark" class="w-full h-24" frameborder="0"></iframe>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
        <div class="md:col-span-2 grid-node border-cyan-700">
            <span class="label-node">INTELIGENCIA_IA</span>
            <div id="status-log" class="h-10 text-[7px] text-zinc-500 italic mb-2">> SISTEMA LISTO PARA VALIDACIÓN...</div>
            
            <div id="video-display" class="hidden border border-cyan-500 bg-black mb-2 shadow-lg">
                <iframe id="main-video" src="" frameborder="0" allow="autoplay; fullscreen" class="w-full aspect-video"></iframe>
            </div>

            <div id="buttons-area" class="hidden grid grid-cols-3 gap-2">
                <button class="bg-zinc-900 border border-cyan-900 p-2 font-bold hover:bg-cyan-500 hover:text-black">DONACIONES</button>
                <button class="bg-zinc-900 border border-cyan-900 p-2 font-bold hover:bg-cyan-500 hover:text-black">SUSCRIPCIONES</button>
                <button class="bg-zinc-900 border border-cyan-900 p-2 font-bold hover:bg-cyan-500 hover:text-black">COLABORACIONES</button>
            </div>
        </div>

        <div class="grid-node border-yellow-900">
            <span class="label-node text-yellow-500">ACCESO_NÚCLEO</span>
            <input type="text" id="pass-input" placeholder="CLAVE" class="w-full bg-black border border-zinc-800 p-2 text-cyan-400 mb-2 text-[8px] outline-none">
            <button onclick="unlock()" class="w-full bg-[#36f4d0] text-black font-black p-2 text-[8px] uppercase active:scale-95 transition">SINCRONIZAR</button>
        </div>
    </div>

    <script>
        // Reloj - Ejecución Inmediata
        function startClock() {
            const clock = document.getElementById('reloj-v8');
            setInterval(() => { clock.innerText = new Date().toLocaleTimeString(); }, 1000);
        }

        // Validación Blindada
        function unlock() {
            const val = document.getElementById('pass-input').value.trim().toUpperCase();
            if(val === "GX-8-7-IMMORTAL") {
                document.body.classList.add('sync-flash');
                setTimeout(() => document.body.classList.remove('sync-flash'), 500);
                
                document.getElementById('status-log').innerHTML = "<span class='text-cyan-400'>> ACCESO TOTAL CONCEDIDO. CARGANDO CANAL...</span>";
                document.getElementById('main-video').src = "https://www.youtube.com/embed/live_stream?channel=UCpP-vL0mH0n0yQ0p_yP0w9g"; // Reemplaza con tu ID real
                document.getElementById('video-display').style.display = 'block';
                document.getElementById('buttons-area').style.display = 'grid';
            } else {
                alert("ERROR: CLAVE INCORRECTA");
            }
        }

        window.onload = startClock;
    </script>
</body>
</html>
