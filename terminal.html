<div class="md:col-span-2 grid-node border-cyan-700 bg-black/60">
    <span class="label-node text-cyan-400">CENTRO_DE_INTELIGENCIA_IA</span>
    <div id="agent-display">
        <div id="agent-orders" class="h-24 overflow-y-auto font-mono text-[7px] space-y-1 p-1">
            <p class="agent-log text-yellow-600 animate-pulse">[!] VALIDACIÓN REQUERIDA PARA CARGAR MANIFIESTO...</p>
        </div>
        
        <div id="youtube-core" class="hidden mt-2 border border-cyan-500">
            <iframe id="video-frame" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen class="w-full aspect-video"></iframe>
        </div>

        <div id="synergy-panel" class="hidden mt-3 grid grid-cols-3 gap-2 pt-2 border-t border-zinc-800">
            <div class="btn-synergy bg-black text-cyan-400 border border-cyan-400/40 p-2 text-center cursor-pointer hover:bg-cyan-400 hover:text-black transition text-[7px] font-bold" onclick="window.open('URL_DONACIONES')">DONACIONES</div>
            <div class="btn-synergy bg-black text-cyan-400 border border-cyan-400/40 p-2 text-center cursor-pointer hover:bg-cyan-400 hover:text-black transition text-[7px] font-bold" onclick="window.open('URL_SUSCRIPCIONES')">SUSCRIPCIONES</div>
            <div class="btn-synergy bg-black text-cyan-400 border border-cyan-400/40 p-2 text-center cursor-pointer hover:bg-cyan-400 hover:text-black transition text-[7px] font-bold" onclick="window.open('URL_COLABORACIONES')">COLABORACIONES</div>
        </div>
    </div>
</div>

<script>
    async function triggerCore() {
        const key = document.getElementById('master-key').value.toUpperCase();
        if(key !== "GX-8-7-IMMORTAL") { alert("ERROR_DE_ID"); return; }
        
        const logBox = document.getElementById('agent-orders');
        const yt = document.getElementById('youtube-core');
        const syn = document.getElementById('synergy-panel');
        const frame = document.getElementById('video-frame');
        
        const sequence = [
            "> CLAVE ACEPTADA.",
            "> SINCRONIZANDO PANEL DE SINERGIA...",
            "> CARGANDO MANIFIESTO_8 (SUMINISTRO ETERNO)..."
        ];

        for(let msg of sequence) {
            const p = document.createElement('p');
            p.className = 'agent-log text-cyan-400';
            p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logBox.prepend(p);
            await new Promise(r => setTimeout(r, 600));
        }

        // 1. Inyectar URL del video (Asegúrate de usar la versión /embed/)
        frame.src = "https://www.youtube.com/embed/TU_ID_DE_VIDEO?autoplay=1&mute=0";
        
        // 2. Desplegar visuales (Forzado para visualización en Vercel)
        logBox.style.height = "40px";
        yt.style.display = "block";
        yt.classList.remove('hidden');
        
        syn.style.display = "grid";
        syn.classList.remove('hidden');

        document.getElementById('action-box').innerHTML = `<div class="p-2 border border-cyan-500 text-center text-cyan-500 text-[6px]">SISTEMA OPERATIVO</div>`;
    }
</script>
