<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEOSYSTEM | Tactical Intelligence v4.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --neon: #36f4d0; --bg: #020617; }
        body { 
            font-family: 'JetBrains Mono', monospace; 
            background-color: var(--bg); color: var(--neon); 
            background-image: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%);
            background-size: 100% 4px;
            overflow-x: hidden;
        }
        .grid-node { border: 1px solid rgba(54, 244, 208, 0.2); background: rgba(2, 6, 23, 0.9); padding: 8px; position: relative; }
        .label-node { font-size: 8px; font-weight: bold; border-bottom: 1px solid rgba(54, 244, 208, 0.3); margin-bottom: 6px; color: var(--neon); display: block; letter-spacing: 1px; }
        
        /* Estilos de Sesión Avanzados */
        .status-pill { padding: 2px 5px; border-radius: 2px; font-size: 6px; margin-left: 4px; }
        .open { background: #064e3b; color: #34d399; border: 1px solid #34d399; box-shadow: 0 0 5px #34d399; }
        .closed { background: #450a0a; color: #f87171; border: 1px solid #f87171; opacity: 0.6; }

        .telex-container { background: rgba(0, 0, 0, 0.9); border-y: 1px solid var(--neon); overflow: hidden; white-space: nowrap; padding: 4px 0; }
        .telex-text { display: inline-block; animation: marquee 50s linear infinite; font-size: 9px; font-weight: bold; }
        @keyframes marquee { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        input { background: #000 !important; border: 1px solid #1e293b !important; color: var(--neon) !important; transition: 0.3s; }
        input:focus { border-color: var(--neon) !important; box-shadow: 0 0 10px rgba(54, 244, 208, 0.2); }
    </style>
</head>
<body class="p-2 md:p-4 uppercase text-[9px]">

    <nav class="flex justify-between border-b border-zinc-800 pb-2 mb-3 items-center">
        <div class="flex flex-col">
            <span class="tracking-tighter font-bold text-cyan-400">GEOSYSTEM_INTEL // V4.5</span>
            <span class="text-[6px] text-zinc-500">SYSTEM_UPDATE: 7% // ENCRYPTED_LINK</span>
        </div>
        <div id="reloj-principal" class="font-bold text-[12px] bg-zinc-900 px-3 py-1 rounded border border-zinc-700">00:00:00</div>
    </nav>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4 text-[7px]">
        <div class="bg-black/40 p-2 border border-zinc-800 flex justify-between items-center">
            <span>TOKIO (TSE)</span><span id="mkt-tokyo" class="status-pill closed">CLOSED</span>
        </div>
        <div class="bg-black/40 p-2 border border-zinc-800 flex justify-between items-center">
            <span>LONDRES (LSE)</span><span id="mkt-london" class="status-pill closed">CLOSED</span>
        </div>
        <div class="bg-black/40 p-2 border border-zinc-800 flex justify-between items-center">
            <span>N. YORK (NYSE)</span><span id="mkt-ny" class="status-pill closed">CLOSED</span>
        </div>
        <div class="bg-black/40 p-2 border border-zinc-800 flex justify-between items-center">
            <span>LATAM (HAPI)</span><span id="mkt-latam" class="status-pill closed">CLOSED</span>
        </div>
    </div>

    <div class="grid-node border-cyan-500 mb-4 bg-black/80">
        <div class="flex gap-2">
            <div class="flex-1 relative">
                <span class="absolute -top-2 left-2 bg-black px-1 text-[6px] text-cyan-500">COMMAND_INPUT</span>
                <input type="text" id="search-symbol" placeholder="INGRESE TICKER (AAPL, BTCUSD, ASHR...)" class="w-full p-2 text-[10px] outline-none">
            </div>
            <button onclick="projectSymbol()" class="bg-cyan-500 text-black font-black px-6 py-2 text-[10px] hover:bg-white active:scale-95 transition">EXEC</button>
        </div>
    </div>

    <div id="projection-node" class="grid-node border-2 border-dashed border-zinc-700 mb-4 hidden">
        <span class="label-node text-white" id="projection-label">DATA_STREAM_ANALYSIS</span>
        <div id="search-result-container" class="w-full h-48"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 mb-6">
        <div class="grid-node border-l-2 border-l-orange-500">
            <span class="label-node">ENERGÍA (WTI OIL)</span>
            <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=TVC%3AUSOIL&theme=dark" class="w-full h-32" frameborder="0"></iframe>
        </div>
        <div class="grid-node border-l-2 border-l-cyan-500">
            <span class="label-node">TOKENIZACIÓN (BTC)</span>
            <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=BINANCE%3ABTCUSDT&theme=dark" class="w-full h-32" frameborder="0"></iframe>
        </div>
        <div class="grid-node border-l-2 border-l-red-600">
            <span class="label-node">EJE_ESTE (ASHR)</span>
            <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=AMEX%3AASHR&theme=dark" class="w-full h-32" frameborder="0"></iframe>
        </div>
        <div class="grid-node border-l-2 border-l-blue-600">
            <span class="label-node">FED_RESERVE (SPY)</span>
            <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=AMEX%3ASPY&theme=dark" class="w-full h-32" frameborder="0"></iframe>
        </div>
        <div class="grid-node border-l-2 border-l-zinc-100">
            <span class="label-node">EU_MARKET (DAX)</span>
            <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=INDEX%3ADAX&theme=dark" class="w-full h-32" frameborder="0"></iframe>
        </div>
        <div class="grid-node border-l-2 border-l-yellow-600">
            <span class="label-node">LATAM_ZONE (ILF)</span>
            <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=AMEX%3AILF&theme=dark" class="w-full h-32" frameborder="0"></iframe>
        </div>
    </div>

    <script>
        function updateSystem() {
            const now = new Date();
            const h = now.getUTCHours();
            const m = now.getUTCMinutes();
            
            // Función auxiliar para verificar estados de mercado
            const isMarketOpen = (start, end) => h >= start && h < end;

            const markets = {
                'mkt-tokyo': isMarketOpen(0, 6),
                'mkt-london': isMarketOpen(8, 16),
                'mkt-ny': isMarketOpen(13, 21), // NYSE 9:30-16:00 EST aprox
                'mkt-latam': isMarketOpen(14, 21)
            };

            for (const [id, open] of Object.entries(markets)) {
                const el = document.getElementById(id);
                el.innerText = open ? 'OPEN' : 'CLOSED';
                el.className = `status-pill ${open ? 'open' : 'closed'}`;
            }

            document.getElementById('reloj-principal').innerText = now.toLocaleTimeString();
        }

        function projectSymbol() {
            const sym = document.getElementById('search-symbol').value.toUpperCase().replace(/\s/g, "");
            if(!sym) return;
            
            const node = document.getElementById('projection-node');
            node.classList.remove('hidden');
            document.getElementById('projection-label').innerText = `ANALÍTICA_PROYECTADA: ${sym}`;
            document.getElementById('search-result-container').innerHTML = `
                <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=${sym}&theme=dark" 
                        class="w-full h-48" frameborder="0"></iframe>`;
            
            // Scroll suave hacia la proyección
            node.scrollIntoView({ behavior: 'smooth' });
        }

        setInterval(updateSystem, 1000);
        updateSystem();
    </script>
</body>
</html>
