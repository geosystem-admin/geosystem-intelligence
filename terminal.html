    <style>

        body {

        /* 1. ESTRUCTURA DE NODOS */

        .closed { color: #f87171; border-color: #f87171; opacity: 0.4; }
        
        /* 3. TEATRO Y ACCIONES */
        #youtube-core { display: none; width: 100%; aspect-ratio: 16/9; margin-top: 10px; border: 1px solid var(--neon); }
        .btn-synergy { border: 1px solid rgba(54, 244, 208, 0.4); padding: 10px; text-align: center; font-size: 7px; cursor: pointer; transition: 0.3s; background: rgba(0,0,0,0.8); }
        .btn-synergy:hover { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); }
        .agent-log { font-size: 7px; color: #a1a1aa; border-left: 1px solid #1e293b; padding-left: 5px; margin-bottom: 2px; }
    </style>
</head>
