<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Terminal | Geosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #2dd4bf; font-family: monospace; overflow: hidden; }
        .crt::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none; }
        .scanline { width: 100%; height: 2px; background: rgba(45, 212, 191, 0.1); position: absolute; animation: scan 4s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body class="crt p-4 flex flex-col h-screen">
    <div class="scanline"></div>

    <header class="border-b border-teal-900 pb-2 mb-4 flex justify-between items-end">
        <div>
            <h1 class="text-lg font-bold tracking-tighter uppercase">Nexus Terminal v1.0.8</h1>
            <p class="text-[9px] opacity-60">SISTEMA DE MONITOREO GEOPOLÍTICO ACTIVO</p>
        </div>
        <div class="text-right text-[10px]">
            <p>CONEXIÓN: ESTABLE</p>
            <p id="clock"></p>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-1 md:grid-cols-3 gap-4 overflow-hidden">
        
        <section class="col-span-2 border border-teal-900 bg-black/40 p-3 overflow-y-auto">
            <h2 class="text-[10px] border-b border-teal-900 mb-2 uppercase">Dictámenes en Tiempo Real</h2>
            <div id="terminal-feed" class="text-[11px] space-y-1">
                <p class="text-white opacity-40">> Inicializando protocolos de inteligencia...</p>
            </div>
        </section>

        <aside class="border border-teal-900 bg-black/40 p-3 flex flex-col space-y-4">
            <h2 class="text-[10px] border-b border-teal-900 mb-2 uppercase">Indicadores de Eje</h2>
            <div class="space-y-3">
                <div class="text-[10px]">
                    <p>FLUJO PETRODÓLAR</p>
                    <div class="w-full h-1 bg-teal-900/50 mt-1"><div class="bg-teal-400 h-full w-[78%]"></div></div>
                </div>
                <div class="text-[10px]">
                    <p>HEGEMONÍA DIGITAL (ASIA)</p>
                    <div class="w-full h-1 bg-teal-900/50 mt-1"><div class="bg-teal-400 h-full w-[62%] animate-pulse"></div></div>
                </div>
            </div>
        </aside>
    </main>

    <script>
        // Reloj
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        // Simulador de logs técnicos
        const feed = document.getElementById('terminal-feed');
        const logs = [
            "> Monitoreando transacciones en el Estrecho de Malaca...",
            "> Alerta: Movimiento detectado en activos tokenizados.",
            "> Sincronizando con nodos en Cali y Bogotá...",
            "> Análisis de riesgo: Transición de hegemonía en curso.",
            "> Actualizando base de datos del Oráculo..."
        ];

        let i = 0;
        setInterval(() => {
            const p = document.createElement('p');
            p.className = "animate-in fade-in duration-500";
            p.innerText = logs[i % logs.length];
            feed.prepend(p);
            i++;
        }, 3000);
    </script>
</body>
</html>
