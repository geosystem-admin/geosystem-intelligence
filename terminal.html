<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEOSYSTEM | Nexus Core v6.1 Full</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --neon: #36f4d0; --bg: #020617; }
        body { 
            font-family: 'JetBrains Mono', monospace; 
            background-color: var(--bg); color: var(--neon); 
            background-image: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%);
            background-size: 100% 4px; margin: 0; padding: 10px;
        }
        .grid-node { border: 1px solid rgba(54, 244, 208, 0.2); background: rgba(2, 6, 23, 0.9); padding: 8px; margin-bottom: 8px; }
        .label-node { font-size: 8px; font-weight: bold; border-bottom: 1px solid rgba(54, 244, 208, 0.3); margin-bottom: 6px; color: var(--neon); display: block; letter-spacing: 1px; }
        .status-pill { padding: 2px 5px; border-radius: 2px; font-size: 6px; border: 1px solid; }
        .open { color: #34d399; border-color: #34d399; box-shadow: 0 0 8px #34d399; }
        .closed { color: #f87171; border-color: #f87171; opacity: 0.5; }
        .agent-log { font-size: 7px; color: #a1a1aa; border-left: 1px solid #1e293b; padding-left: 5px; margin-bottom: 2px; }
        .btn-synergy { background: black; border: 1px solid rgba(54, 244, 208, 0.4); padding: 10px; text-align: center; font-weight: bold; font-size: 8px; transition: all 0.3s; cursor: pointer; }
        .btn-synergy:hover { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); }
        .sync-flash { animation: flash 0.5s ease-out; }
        @keyframes flash { 0% { background-color: #36f4d0; opacity: 0.8; } 100% { background-color: var(--bg); } }
        iframe { filter: contrast(1.1) brightness(0.9); border: none; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="uppercase text-[9px]">

    <nav class="flex justify-between border-b border-zinc-800 pb-2 mb-2 items-center">
        <div class="flex flex-col">
            <span class="tracking-tighter font-bold text-cyan-400">GEOSYSTEM // CORE_V6.1_PRO</span>
            <span class="text-[6px] text-zinc-500 italic">TRANSMISOR DE VERDADES ETERNAS</span>
        </div>
        <div id="reloj-v6" class="font-bold text-[11px] bg-zinc-900 px-3 py-1 rounded border border-zinc-700 text-[#36f4d0]">00:00:00</div>
    </nav>

    <div class="grid-node !p-0 border-zinc-800 mb-3 overflow-hidden h-8 flex items-center">
        <div class="bg-red-900 text-white px-3 h-full flex items-center font-bold text-[7px] animate-pulse z-10">LIVE</div>
        <div class="flex-1 h-full">
            <iframe src="https://s.tradingview.com/embed-widget/ticker-tape/?colorTheme=dark&isTransparent=true&displayMode=regular&width=100%25&height=32&locale=es" width="100%" height="32" scrolling="no"></iframe>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2 mb-4">
        <div class="grid-node border-l-2 border-l-orange-500"><span class="label-node">ENERGÍA (WTI OIL)</span><iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=TVC%3AUSOIL&theme=dark" class="w-full h-28"></iframe></div>
        <div class="grid-node border-l-2 border-l-cyan-500"><span class="label-node">TOKENIZACIÓN (BTC)</span><iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=BINANCE%3ABTCUSDT&theme=dark" class="w-full h-28"></iframe></div>
        <div class="grid-node border-l-2 border-l-red-600"><span class="label-node">EJE_ESTE (ASHR)</span><iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=AMEX%3AASHR&theme=dark" class="w-full h-28"></iframe></div>
        <div class="grid-node border-l-2 border-l-blue-600"><span class="label-node">FED_ZONE (SPY)</span><iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=AMEX%3ASPY&theme=dark" class="w-full h-28"></iframe></div>
        <div class="grid-node border-l-2 border-l-zinc-100"><span class="label-node">EU_ZONE (DAX)</span><iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=INDEX%3ADAX&theme=dark" class="w-full h-28"></iframe></div>
        <div class="grid-node border-l-2 border-l-yellow-600"><span class="label-node">LATAM_ZONE (ILF)</span><iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=AMEX%3AILF&theme=dark" class="w-full h-28"></iframe></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
        <div class="md:col-span-2 grid-node border-cyan-700 bg-black/60">
            <span class="label-node">INTELIGENCIA_EMISOR</span>
            <div id="agent-orders" class="h-10 text-[7px] text-zinc-500 italic mb-2 overflow-y-auto">
                <p>> SISTEMA OPERATIVO. ESPERANDO VALIDACIÓN GX...</p>
            </div>
            
            <div id="hidden-core" class="hidden">
                <div class="border border-cyan-500 bg-black mb-3 shadow-[0_0_20px_rgba(54,244,208,0.2)]">
                    <iframe id="video-frame" src="" frameborder="0" allow="autoplay; fullscreen" class="w-full aspect-video"></iframe>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div onclick="iniciarCaptura('donacion')" class="btn-synergy">DONACIONES</div>
                    <div onclick="iniciarCaptura('suscripcion')" class="btn-synergy">SUSCRIPCIONES</div>
                    <div onclick="iniciarCaptura('colaboracion')" class="btn-synergy">COLABORACIONES</div>
                </div>
            </div>
        </div>

        <div class="grid-node border-yellow-900 bg-yellow-950/10">
            <span class="label-node text-yellow-500 italic">ACCESO_GX_SECURE</span>
            <div id="action-box">
                <input type="text" id="master-key" placeholder="CLAVE" class="w-full bg-black border border-zinc-800 p-2 text-cyan-400 mb-2 text-[8px] outline-none uppercase focus:border-cyan-500">
                <button onclick="triggerCore()" class="w-full bg-[#36f4d0] text-black font-black p-2 text-[8px] uppercase hover:bg-white active:scale-95 transition shadow-lg">SINCRONIZAR</button>
            </div>
        </div>
    </div>

    <script>
        // 1. MOTOR DE TIEMPO
        function clock() {
            const el = document.getElementById('reloj-v6');
            if(el) el.innerText = new Date().toLocaleTimeString();
        }
        setInterval(clock, 1000);

        // 2. SISTEMA DE CAPTURA DE DATOS
        function iniciarCaptura(tipo) {
            const urls = {
                'donacion': 'https://tu-web.com/registro-donante', // Reemplazar con tus links reales
                'suscripcion': 'https://tu-web.com/registro-suscriptor',
                'colaboracion': 'https://tu-web.com/registro-colaborador'
            };
            const log = document.getElementById('agent-orders');
            log.innerHTML += `<p class="agent-log text-cyan-400">> REQUIRIENDO DATOS PERSONALES PARA ${tipo.toUpperCase()}...</p>`;
            window.open(urls[tipo], '_blank');
        }

        // 3. ACTIVACIÓN POR CLAVE
        function triggerCore() {
            const key = document.getElementById('master-key').value.trim().toUpperCase();
            
            if(key === "GX-8-7-IMMORTAL") {
                // Flash de éxito
                document.body.classList.add('sync-flash');
                setTimeout(() => document.body.classList.remove('sync-flash'), 500);

                // Cargar Manifiesto 7%
                const videoID = "JGToOtVf0f8"; 
                const player = document.getElementById('video-frame');
                player.src = `https://www.youtube.com/embed/${videoID}?autoplay=1&rel=0&modestbranding=1`;
                
                // Desbloqueo de Interfaz
                document.getElementById('hidden-core').classList.remove('hidden');
                document.getElementById('agent-orders').innerHTML = '<p class="agent-log text-cyan-400 font-bold">> 7% UPDATE DETECTED. TRANSMITIENDO MANIFIESTO...</p>';
                document.getElementById('action-box').innerHTML = '<div class="text-cyan-400 text-center py-2 border border-cyan-900 font-bold animate-pulse">SISTEMA VIVO</div>';
            } else {
                alert("ERROR: CREDENCIAL INVÁLIDA");
            }
        }

        window.onload = clock;
    </script>
</body>
</html>
