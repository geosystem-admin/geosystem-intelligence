<!DOCTYPE html>
<html lang="es">
<head>

    <title>GEOSYSTEM | Intelligence</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">

<body class="bg-black text-white min-h-screen flex flex-col items-center justify-center p-6 text-center font-['Inter']">

    <header class="mb-12">

    <main class="max-w-2xl">

    <footer class="mt-20 text-[10px] text-gray-600 tracking-[0.5em] uppercase border-t border-zinc-900 pt-8 w-full">
