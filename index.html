<div id="terminal-container" class="space-y-4">
    <button onclick="iniciarAcceso()" id="btn-acceder" class="bg-[#2dd4bf] hover:bg-teal-300 text-black font-black py-5 px-12 rounded-lg text-xl uppercase transition-all transform hover:scale-105 glow-text">
        Acceder a la Terminal
    </button>
    
    <div id="console-output" class="hidden text-left font-mono text-teal-500 text-xs md:text-sm bg-black p-4 rounded border border-teal-900 max-w-md mx-auto h-40 overflow-hidden">
        <p id="line-1">_</p>
    </div>
</div>

<script>
function iniciarAcceso() {
    const btn = document.getElementById('btn-acceder');
    const consoleBox = document.getElementById('console-output');
    const lines = [
        "> ESTABLECIENDO CONEXIÓN CON NODO LATAM...",
        "> ENCRIPTACIÓN RSA 4096-BIT ACTIVA.",
        "> ACCEDIENDO AL ORÁCULO DE DATOS...",
        "> SINCRONIZANDO EJE DE PODER GLOBAL...",
        "> BIENVENIDO, EMISARIO. ACCESO CONCEDIDO."
    ];

    btn.classList.add('hidden');
    consoleBox.classList.remove('hidden');

    let i = 0;
    const interval = setInterval(() => {
        if (i < lines.length) {
            const p = document.createElement('p');
            p.textContent = lines[i];
            consoleBox.appendChild(p);
            i++;
        } else {
            clearInterval(interval);
            // Redirección final a la plataforma
            setTimeout(() => {
                window.location.href = "https://geosystem-intelligence.replit.app/terminal"; 
            }, 1000);
        }
    }, 600);
}
</script>
